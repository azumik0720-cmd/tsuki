<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>接続テスト</title>
<script src="https://unpkg.com/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
</head>
<body style="font-family:-apple-system;padding:32px;background:#ecf4f9;">
<h2 id="status" style="color:#105744;">テスト中...</h2>
<div id="log" style="font-size:13px;color:#666;margin-top:16px;line-height:2;"></div>

<script>
const log = document.getElementById('log');
const status = document.getElementById('status');

function addLog(msg, ok) {
  log.innerHTML += `<div style="color:${ok?'#105744':'#e48979'};">${ok?'✓':'✗'} ${msg}</div>`;
}

// 1. Supabaseライブラリ確認
if (typeof supabase !== 'undefined') {
  addLog('Supabaseライブラリ: 読み込み成功', true);
} else {
  addLog('Supabaseライブラリ: 読み込み失敗', false);
  status.textContent = '❌ 失敗';
  status.style.color = '#e48979';
}

// 2. Supabase接続テスト
try {
  const SUPABASE_URL = 'https://ohqgpmtkhhixvnkrjbvb.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_sAkbWL4FDT2Wt8Q-YYP0Nw_gThPQIX4';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: { autoRefreshToken: true, persistSession: true, detectSessionInUrl: false }
  });
  addLog('Supabaseクライアント: 作成成功', true);

  db.auth.getSession().then(({ data, error }) => {
    if (error) {
      addLog('Supabase接続: エラー → ' + error.message, false);
      status.textContent = '❌ Supabase接続エラー';
      status.style.color = '#e48979';
    } else {
      addLog('Supabase接続: 成功', true);
      addLog('セッション: ' + (data.session ? 'ログイン中' : '未ログイン'), true);
      status.textContent = '✓ すべて正常';
    }
  });
} catch(e) {
  addLog('エラー: ' + e.message, false);
  status.textContent = '❌ エラー';
  status.style.color = '#e48979';
}
</script>
</body>
</html>
